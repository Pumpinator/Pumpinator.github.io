<h1 class="text-center pb-3"><b>Módulo de Producto</b></h1>
<div class="contenedor">
    <div class="row">
        <div class="col">
            <label class="mb-1" for="txtBuscarProducto"><strong>Buscar Producto</strong></label>
            <input class="form-control box" type="text" id="txtBuscarProducto" name="txtBuscarProducto"
                placeholder="Introducir ID de producto">
        </div>
        <div class="col text-end pt-4">
            <button onclick="buscarPrr()" type="button" class="botonBuscar"
                style="--bs-btn-padding-y: .60rem; --bs-btn-padding-x: 4rem; --bs-btn-font-size: 1rem;">Buscar</button>
        </div>
    </div>
</div>

<br>
<div id="datosProducto" class="contenedor">

    <div class="row">

        <div class="col-md-3 FOTO"><br><br>
            <svg width="330" height="410">
                <image href="media/img.PNG" width="100%" height="100%" />
            </svg>
        </div>

        <div id="datosProducto" class="col-md-3 columna1">
            <center>
                <div class="row input-group mb-3">
                    <label for="txtID" class="col">ID:
                        <input id="txtID" class="col form-control box" disabled></label>
                </div>
                <div class="row input-group mb-3">
                    <label for="txtNombreProducto" class="col">Nombre de producto:
                        <input id="txtNombreProducto" class="col form-control box" disabled></label>
                </div>
                <div class="row input-group mb-3">
                    <label for="txtNombreGenerico" class="col">Nombre generico:
                        <input id="txtNombreGenerico" class="col form-control box" disabled></label>
                </div>
                <div class="row input-group mb-3">
                    <label for="txtFormaFarmaceutica" class="col">Forma farmaceutica:
                        <input id="txtFormaFarmaceutica" class="col form-control box" disabled></label>
                </div>
                <div class="row input-group mb-3">
                    <label for="txtUnidadesDeMedida" class="col">Unidades de medida:
                        <input id="txtUnidadesDeMedida" class="col form-control box" disabled></label>
                </div>
                <div class="row input-group mb-3">
                    <label for="txtPresentacion" class="col">Presentacion:
                        <input id="txtPresentacion" class="col form-control box" disabled></label>
                </div>

            </center>
        </div>

        <div class="col-md-3 columna2">
            <center>
                <div class="row input-group mb-3">
                    <label for="txtIndicaciones" class="col">Indicaciones:
                        <input id="txtIndicaciones" class="col form-control box" disabled></label>
                </div>
                <div class="row input-group mb-3">
                    <label for="txtContraIndicaciones" class="col">Contra indicaciones:
                        <input id="txtContraIndicaciones" class="col form-control box" disabled></label>
                </div>
                <div class="row input-group mb-3">
                    <label for="txtConcentracion" class="col">Concentracion:
                        <input id="txtConcentracion" class="col form-control box" disabled></label>
                </div>
                <div class="row input-group mb-3">
                    <label for="txtUnidadesEnEnvase" class="col">Unidades en envase:
                        <input id="txtUnidadesEnEnvase" class="col form-control box" disabled></label>
                </div>
                <div class="row input-group mb-3">
                    <label for="txtPrecioCompra" class="col">Precio de compra:
                        <input id="txtPrecioCompra" class="col form-control box" disabled></label>
                </div>
                <div class="row input-group mb-3">
                    <label for="txtPrecioVenta" class="col">Precio de venta:
                        <input id="txtPrecioVenta" class="col form-control box" disabled></label>
                </div>
                <div class="row input-group mb-3">
                    <label for="txtCodigoBarras" class="col">Codigo de barras:
                        <input id="txtCodigoBarras" class="col form-control box" disabled></label>
                </div>

            </center>
        </div>
        <div class="col-md-2">
            <div class="form-check form-switch form-check-reverse">
                <input class="form-check-input" type="checkbox" id="estatus" disabled>
                <label class="form-check-label" for="estatus">Estatus</label>
            </div>
            <!-- icono editar -->
            <div class="row input-group mb-1">
                <div class="col form-check form-switch form-check-reverse" style="margin-left: 110px; margin-top: 5px;">
                    <svg xmlns="http://www.w3.org/2000/svg" style="margin-left: 30px;" width="50" height="50"
                        fill="currentColor" class="bi bi-pencil-square" viewBox="0 0 16 16" onclick="editarProducto()">
                        <path fill-rule="evenodd"
                            d="M1 13.5A1.5 1.5 0 0 0 2.5 15h11a1.5 1.5 0 0 0 1.5-1.5v-6a.5.5 0 0 0-1 0v6a.5.5 0 0 1-.5.5h-11a.5.5 0 0 1-.5-.5v-11a.5.5 0 0 1 .5-.5H9a.5.5 0 0 0 0-1H2.5A1.5 1.5 0 0 0 1 2.5v11z">
                        </path>
                        <path
                            d="M15.502 1.94a.5.5 0 0 1 0 .706L14.459 3.69l-2-2L13.502.646a.5.5 0 0 1 .707 0l1.293 1.293zm-1.75 2.456-2-2L4.939 9.21a.5.5 0 0 0-.121.196l-.805 2.414a.25.25 0 0 0 .316.316l2.414-.805a.5.5 0 0 0 .196-.12l6.813-6.814z">
                        </path>
                    </svg>
                    <label class="form-check-label" for="estatus">Editar</label>
                </div>
            </div>
            <!-- icono eliminar -->
            <div class="row input-group mb-1">
                <div class="col form-check form-switch form-check-reverse" style="margin-left: 110px; margin-top: 5px;">
                    <svg xmlns="http://www.w3.org/2000/svg" style="margin-left: 30; margin-top: 5px;" width="50"
                        height="50" fill="currentColor" class="bi bi-trash3 eliminar-icon" viewBox="0 0 16 16"
                        onclick="eliminarProducto()">
                        <path
                            d="M6.5 1h3a.5.5 0 0 1 .5.5v1H6v-1a.5.5 0 0 1 .5-.5ZM11 2.5v-1A1.5 1.5 0 0 0 9.5 0h-3A1.5 1.5 0 0 0 5 1.5v1H2.506a.58.58 0 0 0-.01 0H1.5a.5.5 0 0 0 0 1h.538l.853 10.66A2 2 0 0 0 4.885 16h6.23a2 2 0 0 0 1.994-1.84l.853-10.66h.538a.5.5 0 0 0 0-1h-.995a.59.59 0 0 0-.01 0H11Zm1.958 1-.846 10.58a1 1 0 0 1-.997.92h-6.23a1 1 0 0 1-.997-.92L3.042 3.5h9.916Zm-7.487 1a.5.5 0 0 1 .528.47l.5 8.5a.5.5 0 0 1-.998.06L5 5.03a.5.5 0 0 1 .47-.53Zm5.058 0a.5.5 0 0 1 .47.53l-.5 8.5a.5.5 0 1 1-.998-.06l.5-8.5a.5.5 0 0 1 .528-.47ZM8 4.5a.5.5 0 0 1 .5.5v8.5a.5.5 0 0 1-1 0V5a.5.5 0 0 1 .5-.5Z">
                        </path>
                    </svg>
                    <label class="form-check-label" for="estatus">Eliminar</label>
                </div>
            </div>
            <!-- icono reiniciar estatus -->
            <div class="row input-group mb-1">
                <div class="col form-check form-switch form-check-reverse" style="margin-left: 110px; margin-top: 5px;">
                    <svg xmlns="http://www.w3.org/2000/svg" style="margin-left: 30px; margin-top: 5px;" width="50"
                        height="50" fill="currentColor" class="bi bi-arrow-clockwise" viewBox="0 0 16 16"
                        onclick="reloadProducto()">
                        <path fill-rule="evenodd"
                            d="M8 3a5 5  0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2v1z" />
                        <path
                            d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z" />
                    </svg>
                    <label class="form-check-label" for="estatus">Activar</label>
                </div>
            </div>
        </div>
    </div>
</div>
<!-- formEditarProducto -->
<div class="editarProducto">
    <div id="formularioEdicion" class="contenedor-edicion padd">

        <div class="edicion-inner">
            <h1> Editar Producto </h1>
            <div class="row input-group mb-2">
                <label for="editNombreProducto" class="col">Nombre de producto:
                    <input id="editNombreProducto" class="col form-control"></label>
            </div>
            <div class="row input-group mb-2">
                <label for="editNombreGenerico" class="col">Nombre generico:
                    <input id="editNombreGenerico" class="col form-control"> </label>
            </div>

            <div class="row input-group mb-2">
                <label for="editFormaFarmaceutica" class="col">Forma farmaceutica:
                    <input id="editFormaFarmaceutica" class="col form-control"> </label>
            </div>
            <div class="row input-group mb-2">
                <label for="editUnidadesDeMedida" class="col">Unidades de medida:
                    <input id="editUnidadesDeMedida" class="col form-control"> </label>
            </div>
            <div class="row input-group mb-2">
                <label for="editPresentacion" class="col">Presentacion:
                    <input id="editPresentacion" class="col form-control"> </label>
            </div>
            <div class="row input-group mb-2">
                <label for="editIndicaciones" class="col">Indicaciones:
                    <input id="editIndicaciones" class="col form-control"> </label>
            </div>
            <div class="row input-group mb-2">
                <label for="editContraIndicaciones" class="col">Contra indicaciones:
                    <input id="editContraIndicaciones" class="col form-control"> </label>
            </div>
            <div class="row input-group mb-2">
                <label for="editConcentracion" class="col">Concentracion:
                    <input id="editConcentracion" class="col form-control"> </label>
            </div>
            <div class="row input-group mb-2">
                <label for="editUnidadesEnEnvase" class="col">Unidades en envase:
                    <input id="editUnidadesEnEnvase" class="col form-control"> </label>
            </div>
            <div class="row input-group mb-2">
                <label for="editPrecioCompra" class="col">Precio de compra:
                    <input id="editPrecioCompra" class="col form-control"> </label>
            </div>
            <div class="row input-group mb-2">
                <label for="editPrecioVenta" class="col">Precio de venta:
                    <input id="editPrecioVenta" class="col form-control"> </label>
            </div>
        </div>
        <div class="row text-center"><br><br>
            <button class="btn-confirmar" onclick="confirmarEdicion()">Confirmar</button>
            <button class="btn-cancelar" onclick="cancelarEdicion()">Cancelar</button>
            <button class="btn-limpiar" onclick="limpiarCamposEdicion()">Limpiar Campos</button>
        </div>


    </div>
</div>







<!-- BLOQUE DE DATOS -->

<div class="contenedor">
    <form class="row">
        <div class="col-md-4">
            <div class="col">
                <label class="mb-1" for="txtClienteBuscar"><strong>Consultar registros de producto</strong></label>
                <input class="col form-control box" type="text" id="txtBusqueda" name="txtBusqueda"
                    placeholder="Buscar por inicial...">
            </div>
        </div>

        <!-- BotÃ³n de consulta -->
        <div class="col-md-8">
            <div class="btnBuscar1 text-end"> <br>
                <button class="botonBuscar" type="button" placeholder="Buscar"
                    onclick="buscarProductos()">Buscar</button>

            </div>
        </div>

    </form>
</div>
<br>
<h1 class="text-center pb-2"><b>Registro de productos</b></h1>
<div class="form-check form-switch form-check-reverse">
    <label class="form-check-label" for="filtro-estatus">Estatus</label>
    <input class="form-check-input" type="checkbox" id="filtro-estatus" onchange="consultarProducto()">

</div>
<br>
<div class="contenedor_consulta">

    <table class="table table-striped table-sm">
        <thead>
            <tr>
                <th scope="col">ID</th>
                <th scope="col">Nombre producto</th>
                <th scope="col">Nombre generico</th>
                <th scope="col">Forma farmacéutica</th>
                <th scope="col">Unidades de medida</th>
                <th scope="col">Presentacion</th>
                <th scope="col">Indicaciones</th>
                <th scope="col">Contraindicaciones</th>
                <th scope="col">Concentración</th>
                <th scope="col">Unidades en envase</th>
                <th scope="col">Precio compra</th>
                <th scope="col">Precio venta</th>
                <th scope="col">Codigo de barras</th>
                <th scope="col">Estatus</th>
            </tr>
        </thead>
        <tbody id="consultaProducto">
        </tbody>
    </table>
</div>
