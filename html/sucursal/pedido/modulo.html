<main>
    <div class="container my-5" >
    <div class="table-responsive small">
        
        <div class="container pt-3 p-5 mb-4 bg-body-tertiary rounded-3">
          <div class="row">
              <div class="col">
                  <label class="mb-1" for="campo-busqueda"><strong>Buscar:</strong></label>
                  <input class="form-control" type="text" id="campo-busqueda" name="campo-busqueda" placeholder="Buscar">
              </div>
              <div class="col text-end pt-4">
                  <button onclick="buscarPedido()" type="button" class="btn btn-success"
                          style="--bs-btn-padding-y: .25rem; --bs-btn-padding-x: 5rem; --bs-btn-font-size: 1rem;">Buscar</button>
              </div>
              <div class="col text-end pt-4">
                <button onclick="cargarContenido('agregarPedido.html')" type="button" class="btn btn-success"
                        style="--bs-btn-padding-y: .25rem; --bs-btn-padding-x: 5rem; --bs-btn-font-size: 1rem;">Nuevo Pedido</button>
            </div>
          </div>
      </div>
  
      
      <div class="form-check form-switch form-check-reverse">
          <input class="form-check-input" type="checkbox" id="filtro-estatus"  onchange="mostrarRegistrosPedido()">
          <label class="form-check-label" for="filtro-estatus">Estatus</label>
        </div>
  
      <div class="table-scroll">
        <table class="table table-striped">
        <thead>
          <tr>
            <th scope="col">Id</th>
            <th scope="col">Sucursal</th>
            <th scope="col">Fecha y Hora</th>
            <th scope="col">Producto</th>
            <th scope="col">Cantidad</th>
            <th scope="col">Estatus</th>
            <th scope="col">Detalles</th>
          </tr>
        </thead>
        <tbody id="tablaPedidoSucursal">
        </tbody>
      </table>
  </div>
<br><br><br>
  <!-- BLOQUE DE DATOS -->
  <div id="pedidoCentral" class="container pt-3 p-5 mb-4 custom-container">
    <div class="row">
        <div class="col-md-3">
            <div class="row input-group mb-3">
                <label for="input-id" class="col"><strong>id de Pedido:</strong></label>
                <input type="text" id="input-id" class="col form-control" disabled>
            </div>
            <div class="row input-group mb-3">
                <label for="input-suc" class="col"><strong>Sucursal:</strong></label>
                <input type="text" id="input-suc" class="col form-control" disabled>
            </div>
            <div class="row input-group mb-3">
                <label for="input-fechaHora" class="col"><strong>Fecha y Hora:</strong></label>
                <input type="text" id="input-fechaHora" class="col form-control" disabled>
            </div>
        </div>
            <div class="col-md-3">
            <div class="row input-group mb-3">
                <label for="input-total" class="col"><strong>Producto:</strong></label>
                <input type="text" id="input-total" class="col form-control" disabled>
            </div>
            <div class="row input-group mb-3">
                <label for="input-idEmpleado" class="col"><strong>Cantidad:</strong></label>
                <input type="text" id="input-idEmpleado" class="col form-control" disabled>
            </div>
            <div class="row input-group mb-3">
                <label for="input-estatus" class="col"><strong>Estatus:</strong></label>
                <input type="text" id="input-estatus" class="col form-control" disabled>
            </div>
        </div>
        <div class="col-md-3">
            <div class="row input-group mb-3">
            <label for="inputCiudad" class="col"><strong>Ciudad:</strong></label>
            <input type="text" id="inputCiudad" class="col form-control" disabled>
        </div>
        <div class="row input-group mb-3">
            <label for="inputEstado" class="col"><strong>Estado:</strong></label>
            <input type="text" id="inputEstado" class="col form-control" disabled>
        </div>
        <div class="row input-group mb-3">
            <label for="inputCp" class="col"><strong>Codigo Postal:</strong></label>
            <input type="text" id="inputCp" class="col form-control" disabled>
        </div>
        <div class="row input-group mb-3">
            <label for="inputEmpleado" class="col"><strong>Empleado:</strong></label>
            <input type="text" id="inputEmpleado" class="col form-control" disabled>
        </div>
        </div>
        
      </div>
      <br><br><br>
      <button type="button" class="btn btn-success btn-lg w-100" onclick="cancelarPedido()">Cancelar Pedido</button>
      
      </div>
    </div>
    </main>
